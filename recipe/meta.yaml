{% set name = "zulip" %}
{% set version = "0.9.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/zulip-{{ version }}.tar.gz
  sha256: abeba4147625107f690bb633143fdf36cd665fe037b3871011fd4b1e3dc081e8

build:
  entry_points:
    - zulip-send=zulip.send:main
    - zulip-api-examples=zulip.api_examples:main
    - zulip-matrix-bridge=integrations.bridge_with_matrix.matrix_bridge:main
    - zulip-api=zulip.cli:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.8
  run:
    - click
    - distro
    - matrix-nio
    - python >=3.8
    - requests >=0.12.1
    - typing-extensions >=4.5.0

test:
  imports:
    - integrations
    - zulip
  commands:
    - pip list
    - pip check
    - zulip-send --help
    - zulip-api-examples --help
    - zulip-matrix-bridge --help
    # - zulip-api --help
  requires:
    - pip

about:
  home: https://pypi.org/project/zulip
  summary: Bindings for the Zulip message API
  license: MIT
  license_file: integrations/perforce/license.txt
  dev_url: https://github.com/zulip/python-zulip-api

extra:
  recipe-maintainers:
    - goanpeca
